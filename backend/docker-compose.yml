services:
  mariadb:
    image: mariadb:11.4
    container_name: fertways-mariadb
    restart: unless-stopped
    ports:
      # Host 3308 → container 3306 (3306 = MySQL local; 3307 = outro projeto Docker).
      - "3308:3306"
    environment:
      MARIADB_ROOT_PASSWORD: fertways_root
      MARIADB_DATABASE: fertways
      MARIADB_USER: fertways
      MARIADB_PASSWORD: fertways_pw
    volumes:
      - fertways_mariadb:/var/lib/mysql
      # Concede privilégios globais ao usuário fertways para o shadow DB do Prisma.
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  fertways_mariadb:
