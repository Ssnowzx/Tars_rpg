# Stack isolada do projeto Tars_rpg (Fertways).
# Projeto, rede e volume têm nomes próprios (prefixo tars-rpg) para não
# colidir com os demais projetos desta VPS (ex.: xiax).
name: tars-rpg

services:
  mariadb:
    image: mariadb:11.4
    container_name: tars-rpg-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - tars_rpg_mariadb:/var/lib/mysql
      # Concede privilégios globais ao usuário do app (shadow DB do Prisma).
      - ../backend/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - tars-rpg-net
    # Banco NÃO exposto ao host: acessível somente pela rede interna do projeto.
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    container_name: tars-rpg-api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@mariadb:3306/${DB_NAME}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS}
    volumes:
      # O seed (prisma/seed.ts) lê os JSONs de referência de ../app/assets/fixtures.
      # Montados read-only para o re-seed funcionar sem depender do build.
      - ../app/assets/fixtures:/app/assets/fixtures:ro
    ports:
      # Exposto apenas em localhost; use um reverse proxy (Apache/Nginx) se
      # quiser publicar externamente.
      - "127.0.0.1:${API_HOST_PORT}:3000"
    networks:
      - tars-rpg-net

  web:
    build:
      context: ../app
      dockerfile: ../docker/Dockerfile.web
    container_name: tars-rpg-web
    restart: unless-stopped
    ports:
      # Frontend Flutter web (nginx), exposto só em localhost; o Apache faz o proxy.
      - "127.0.0.1:${WEB_HOST_PORT}:80"
    networks:
      - tars-rpg-net

networks:
  tars-rpg-net:
    name: tars-rpg-net
    driver: bridge

volumes:
  tars_rpg_mariadb:
    name: tars-rpg-mariadb
